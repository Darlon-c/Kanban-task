<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
    <title>Document</title>
  </head>
  <body class="bg-gray-50">
    <div class="flex justify-center gap-4 py-10">
      <input
        type="text"
        id="taskName"
        class="px-8 py-2 border-0 rounded-lg shadow-lg focus:ring-2 focus:ring-teal-300 w-80"
        placeholder="Adicionar nova tarefa..."
      />
      <button
        class="px-4 py-1 font-semibold tracking-tighter bg-teal-400 rounded-md hover:bg-teal-300"
        id="btnTask"
      >
        Add task
      </button>
    </div>
    <main class="min-h-screen px-4 py-8 bg-gray-50">
      <section
        class="grid grid-cols-1 gap-4 px-4 mx-auto mt-8 md:grid-cols-2 lg:grid-cols-3 lg:max-w-6xl"
      >
        <div class="flex-col felx">
          <h3 class="mb-3 text-lg font-semibold text-gray-700">
            <span
              class="inline-block w-3 h-3 mr-2 bg-blue-500 rounded-full"
            ></span>
            Não Iniciado
          </h3>
          <div
            class="min-h-[550px] bg-white p-3 rounded-xl shadow-sm border border-gray-200"
            id="notInitiated"
          ></div>
        </div>

        <div class="flex-col felx">
          <h3 class="mb-3 text-lg font-semibold text-gray-700">
            <span
              class="inline-block w-3 h-3 mr-2 bg-yellow-500 rounded-full"
            ></span>
            Em Andamento
          </h3>
          <div
            class="min-h-[550px] bg-white p-3 rounded-xl shadow-sm border border-gray-200"
            id="started"
          ></div>
        </div>

        <div class="flex-col felx">
          <h3 class="mb-3 text-lg font-semibold text-gray-700">
            <span
              class="inline-block w-3 h-3 mr-2 bg-green-500 rounded-full"
            ></span>
            Finalizado
          </h3>
          <div
            class="min-h-[550px] bg-white p-3 rounded-xl shadow-sm border border-gray-200"
            id="completed"
          ></div>
        </div>
      </section>
    </main>
    <script src="/Js/index.js"></script>
  </body>
</html>
