<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <title>Document</title>
  </head>
  <body>
    <div>
      <input type="text" id="taskName" class="border rounded-lg" />
      <button class="border bg-slate-500" id="btnTask">Add task</button>
    </div>
    <main class="flex justify-center bg-slate-400 ">
      <section class="grid w-2/4 grid-cols-3  min-h-[600px]">
        <div
          class="p-4 border rounded-lg"
          id="notInitiated"
        ></div>

        <div
          class="p-4 border rounded-lg"
          id="started"
        ></div>

        <div
          class="p-4 border rounded-lg"
          id="completed"
        ></div>
      </section>
    </main>

    <script src="/Js/index.js"></script>
  </body>
</html>
